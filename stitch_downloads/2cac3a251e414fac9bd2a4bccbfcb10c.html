<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex font-body-md">
<!-- Split Screen Shell -->
<div class="flex w-full h-full">
<!-- Left Side: Image/Branding -->
<div class="hidden lg:flex w-1/2 bg-surface-container-high relative flex-col justify-between p-12">
<div class="z-10">
<h1 class="font-headline-lg text-headline-lg text-primary flex items-center gap-3">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">work</span>
                    HRFlow
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-4 max-w-md">
                    Join thousands of professionals finding their next big opportunity. Streamlined application, transparent tracking, and direct communication.
                </p>
</div>
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-40 mix-blend-multiply" data-alt="A modern, high-end corporate office environment bathed in natural light. Diverse professionals engaged in collaborative, focused work. The lighting is soft and bright, emphasizing a clean, efficient, and welcoming atmosphere. The overall aesthetic is professional, reliable, and optimistic, utilizing a subtle palette of deep blues, crisp whites, and neutral grays." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCH46uAUn0_ZgctM1rfZ5tUvDpTScGcSZ6DngIcJ9tyf0MQxRntJOxL0ikf-C9Q1EXUFZ_qyQ1puTGdV1uEl860y52GBu1NbWMufAJOz8fdzpqJ-zSVvbN0lGeTuXz8UnMIQC1NjwDWu65bQ38-LHd-vlQnbOJww_JUUSb028U6nnlRKb_PDt5U1MplcEbL8-_fOesYIn0cJH4gslRJant9SvALaFFUSF7Mmdj8rrWe8AhQZ5WtzXiUtw')"></div>
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high/80 to-surface-container-lowest/20"></div>
</div>
<div class="z-10">
<!-- Decorative abstract element -->
<div class="flex gap-2 mb-8">
<div class="w-12 h-2 bg-primary rounded-full"></div>
<div class="w-4 h-2 bg-primary/30 rounded-full"></div>
<div class="w-4 h-2 bg-primary/30 rounded-full"></div>
</div>
</div>
</div>
<!-- Right Side: Form Container -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-24 overflow-y-auto bg-surface">
<div class="w-full max-w-md space-y-8">
<!-- Mobile Logo -->
<div class="lg:hidden text-center mb-8">
<h1 class="font-headline-md text-headline-md text-primary flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">work</span>
                        HRFlow
                    </h1>
</div>
<div class="text-center">
<h2 class="font-headline-md text-headline-md text-on-surface">Create an Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Sign up to apply and track your job applications.</p>
</div>
<form class="space-y-6 mt-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Full Name -->
<div class="space-y-2 md:col-span-2">
<label class="block font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-on-surface placeholder-on-surface-variant/50 shadow-sm" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-on-surface placeholder-on-surface-variant/50 shadow-sm" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="phone">Phone Number</label>
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-on-surface placeholder-on-surface-variant/50 shadow-sm" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2 relative">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-on-surface placeholder-on-surface-variant/50 shadow-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Meter -->
<div class="mt-2 space-y-1">
<div class="flex gap-1 h-1.5 w-full rounded-full overflow-hidden">
<div class="w-1/4 bg-primary/20"></div>
<div class="w-1/4 bg-surface-variant"></div>
<div class="w-1/4 bg-surface-variant"></div>
<div class="w-1/4 bg-surface-variant"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant text-right">Weak</p>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2 relative">
<label class="block font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-on-surface placeholder-on-surface-variant/50 shadow-sm" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary bg-surface border-outline-variant rounded focus:ring-primary focus:ring-2 cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                                I agree to the <a class="text-secondary hover:text-primary hover:underline transition-colors" href="#">Terms of Service</a> and <a class="text-secondary hover:text-primary hover:underline transition-colors" href="#">Privacy Policy</a>.
                            </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center justify-center gap-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-8">
                    Already have an account? 
                    <a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors" href="/login">Log In</a>
</p>
</div>
</div>
</div>
</body></html>
