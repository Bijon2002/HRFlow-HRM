                    },
                    borderRadius: {

                    },
                    fontFamily: {

<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="h-full bg-background text-on-background font-body-md antialiased">
<div class="flex min-h-full">
<!-- Left Panel: Brand / Illustration -->
<div class="hidden lg:flex lg:flex-1 flex-col justify-between bg-primary relative overflow-hidden">
<!-- Decorative geometric overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 10% 20%, #ffffff 1px, transparent 1px); background-size: 24px 24px;"></div>
<div class="relative z-10 p-12 h-full flex flex-col justify-between">
<div>
<h1 class="font-headline-lg text-headline-lg font-black text-on-primary">HRFlow</h1>
<p class="font-headline-sm text-headline-sm text-primary-fixed-dim mt-2 max-w-md">The unified management suite for high-stakes recruitment.</p>
</div>
<div class="w-full h-96 rounded-xl overflow-hidden shadow-2xl border border-primary-container relative">
<img class="absolute inset-0 w-full h-full object-cover" data-alt="A sophisticated digital 3D illustration representing human resource management and recruitment workflows. Abstract representations of candidate profiles, connected by glowing digital lines, forming a network over a dark navy blue grid background. The lighting is high-key and professional, emphasizing efficiency and precision in a modern corporate setting. The overall mood is authoritative yet approachable, using a palette dominated by deep navy blue, crisp whites, and subtle glowing cyan accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCj-kksHJvY3EQcTaRykYR32dyKeD4o3hWfOwhJ3dRrc0afTAKzxQ8_GAgXqmxiwHO47C9WZFHa4dvrKI0JyawDPlXxDHit-NYFdLl6njRTCMruN1lw2tu-LPEZd2nMM_h3FKqJXOl0mUBqFGj-_yCcjNLHGsHPg5Z8AQTTruzmVndqcFJOyoDxtLlYzuMOXAFOLOFR9NtTMeMYkzdiM6-I67gpqi8kegl9frSCYqUGYdRgYPyo5l2iNA"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="absolute bottom-6 left-6 right-6">
<p class="font-body-lg text-body-lg text-on-primary italic">"Streamlining our hiring process by 40% in the first quarter."</p>
</div>
</div>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="flex flex-1 flex-col justify-center items-center px-4 py-12 sm:px-6 lg:flex-none lg:w-[600px] lg:px-20 bg-surface">
<div class="mx-auto w-full max-w-[420px]">
<!-- Mobile Logo Header -->
<div class="lg:hidden mb-8 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary">HRFlow</h1>
</div>
<div class="bg-surface-container-lowest py-8 px-6 shadow-sm border border-outline-variant rounded-xl">
<h2 class="font-headline-md text-headline-md text-on-background text-center mb-6">Welcome back to HRFlow</h2>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="email">Email address</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full rounded-md border border-outline-variant bg-surface px-3 py-2 text-on-background shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary sm:text-sm transition-colors" id="email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="password">Password</label>
<div class="mt-1 relative rounded-md shadow-sm">
<input autocomplete="current-password" class="block w-full rounded-md border border-outline-variant bg-surface px-3 py-2 pr-10 text-on-background shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary sm:text-sm transition-colors" id="password" name="password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<div>
<button class="flex w-full justify-center rounded-md border border-transparent bg-primary-container py-2.5 px-4 font-label-md text-label-md text-on-primary shadow-sm hover:bg-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all" type="submit">
                                Log In
                            </button>
</div>
</form>
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-surface-container-lowest px-2 text-on-surface-variant font-body-md text-body-md">New candidate?</span>
</div>
</div>
<div class="mt-6">
<a class="flex w-full justify-center rounded-md border border-outline-variant bg-surface py-2.5 px-4 font-label-md text-label-md text-primary shadow-sm hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all" href="/signup">
                                Create an account
                            </a>
</div>
</div>
</div>
<p class="mt-8 text-center text-xs text-on-surface-variant">
                    © 2024 HRFlow Inc. All rights reserved.
                </p>
</div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
                visibilityIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
                visibilityIcon.setAttribute('data-icon', 'visibility');
            }
        }
    </script>
</body></html>
